  :root {
    --fg: #E8EEF2;
    --green: #39D98A;
    --red: #FF4D6D;
    --muted: #7A8896;
    --bg: #0B0F14;
  }
  html, body { background: var(--bg); }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; font-family: "Space Grotesk", sans-serif; color: var(--fg); }
  .stage { position: relative; width: 1920px; height: 1080px; }

  /* Black curtain that hides everything for first 500ms */
  .curtain {
    position: absolute;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    animation: curtain-off 80ms steps(2, end) 500ms forwards;
  }
  @keyframes curtain-off {
    from { opacity: 1; }
    to   { opacity: 0; pointer-events: none; visibility: hidden; }
  }

  .corner { position: absolute; width: 40px; height: 40px; opacity: 0; animation: fadein 300ms steps(8, end) 600ms forwards; }
  .corner.tl { top: 32px; left: 32px; border-top: 2px solid var(--green); border-left: 2px solid var(--green); }
  .corner.tr { top: 32px; right: 32px; border-top: 2px solid var(--green); border-right: 2px solid var(--green); }
  .corner.bl { bottom: 32px; left: 32px; border-bottom: 2px solid var(--green); border-left: 2px solid var(--green); }
  .corner.br { bottom: 32px; right: 32px; border-bottom: 2px solid var(--green); border-right: 2px solid var(--green); }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

  .wordmark { position: absolute; top: 32px; left: 32px; line-height: 0; opacity: 0; animation: fadein 300ms steps(8, end) 600ms forwards; }
  .rev { position: absolute; bottom: 48px; right: 64px; font-family: "JetBrains Mono", monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.08em; opacity: 0; animation: fadein 300ms steps(8, end) 600ms forwards; }

  .center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
  }

  /* Lockup reveals via vertical clip-path (wipe-up from bottom), 600ms steps(12), starts 500ms */
  .lockup {
    clip-path: inset(100% 0 0 0);
    animation:
      lockup-reveal 600ms steps(12, end) 500ms forwards,
      lockup-shrink 500ms steps(10, end) 2500ms forwards;
    transform-origin: center center;
  }
  @keyframes lockup-reveal {
    from { clip-path: inset(100% 0 0 0); }
    to   { clip-path: inset(0% 0 0 0); }
  }
  @keyframes lockup-shrink {
    from { transform: scale(1.0); }
    to   { transform: scale(0.5); }
  }

  /* Tagline "FALSIFY FIXES THAT." slams in at t=2.5 underneath */
  .tag {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 64px;
    color: var(--fg);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transform: scale(1.15);
    opacity: 0;
    animation: slam 100ms linear 2500ms forwards;
  }
  @keyframes slam {
    from { transform: scale(1.15); opacity: 0; }
    to   { transform: scale(1.0);  opacity: 1; }
  }

  /* Three-word rhythm: PRE-REGISTER. HASH IT. LOCK IT. slam 250ms apart starting t=5.5 */
  .rhythm {
    display: flex;
    gap: 48px;
    margin-top: 24px;
  }
  .rhythm-word {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 52px;
    color: var(--green);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transform: scale(1.15);
    opacity: 0;
    animation: slam 80ms linear forwards;
  }
  .rhythm-word:nth-child(1) { animation-delay: 5500ms; }
  .rhythm-word:nth-child(2) { animation-delay: 5750ms; }
  .rhythm-word:nth-child(3) { animation-delay: 6000ms; }

  /* Green rule under tagline draws in from center outward */
  .rule {
    width: 0;
    height: 2px;
    background: var(--green);
    opacity: 0;
    animation: rule-draw 600ms steps(20, end) 7000ms forwards;
  }
  @keyframes rule-draw {
    from { width: 0; opacity: 1; }
    to   { width: 640px; opacity: 1; }
  }

  /* ── v3.1 visual polish (injected) ── */
  .grid-bg {
    position: absolute; inset: 0;
    background-color: transparent !important;
    background-image: radial-gradient(circle, rgba(57, 217, 138, 0.08) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 1;
  }
  .scanlines {
    position: absolute; inset: 0;
    background-color: transparent !important;
    background-image: repeating-linear-gradient(
      to bottom,
      rgba(255, 255, 255, 0.00) 0px,
      rgba(255, 255, 255, 0.00) 2px,
      rgba(0, 0, 0, 0.05) 3px,
      rgba(0, 0, 0, 0.05) 4px
    );
    pointer-events: none;
    z-index: 50;
  }
  .vignette-frame {
    position: absolute; inset: 0;
    background-color: transparent !important;
    background-image: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.30) 100%);
    pointer-events: none;
    z-index: 49;
  }
  /* Bloom utility classes — apply text-shadow glow matching fg color */
  .bloom-green { text-shadow: 0 0 14px rgba(57, 217, 138, 0.55), 0 0 36px rgba(57, 217, 138, 0.25); }
  .bloom-red   { text-shadow: 0 0 14px rgba(255, 77, 109, 0.60), 0 0 36px rgba(255, 77, 109, 0.25); }

</style>
</head>
