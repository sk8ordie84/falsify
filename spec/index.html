<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PRML v0.1 — Pre-Registered ML Manifest Specification</title>
<meta name="description" content="PRML defines a content-addressed serialization format for pre-registered machine learning evaluation claims. Working draft, public review.">
<meta name="author" content="Studio-11">
<link rel="canonical" href="https://spec.falsify.dev/v0.1">
<meta property="og:title" content="PRML v0.1 — Pre-Registered ML Manifest Specification">
<meta property="og:description" content="A cryptographic primitive for verifiable ML evaluation claims. Working draft.">
<meta property="og:url" content="https://spec.falsify.dev/v0.1">
<meta property="og:type" content="article">
<meta name="twitter:card" content="summary">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fdfdfb;
  --ink: #0b0f14;
  --ink-2: #2b3340;
  --ink-3: #5a6677;
  --rule: #d6d9de;
  --accent: #39d98a;
  --code-bg: #f4f4f0;
  --code-ink: #1a1f29;
  --max: 720px;
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: "Source Serif 4", Georgia, "Times New Roman", serif;
  font-size: 17px;
  line-height: 1.65;
  font-feature-settings: "kern", "liga", "onum";
}
.wrap {
  max-width: var(--max);
  margin: 0 auto;
  padding: 64px 28px 120px;
}
header.masthead {
  border-bottom: 1px solid var(--rule);
  padding-bottom: 18px;
  margin-bottom: 36px;
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-size: 13px;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
header.masthead a { color: var(--ink-3); text-decoration: none; border-bottom: 1px dotted var(--ink-3); }
header.masthead a:hover { color: var(--ink); border-color: var(--ink); }
header.masthead .brand { font-weight: 700; color: var(--ink); }
header.masthead .brand .chev { color: var(--accent); }

article h1 {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-size: 32px;
  line-height: 1.2;
  font-weight: 700;
  letter-spacing: -0.01em;
  margin: 0 0 12px;
}
article h2 {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin: 56px 0 14px;
  letter-spacing: -0.005em;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 6px;
}
article h3 {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-size: 17px;
  font-weight: 600;
  margin: 36px 0 10px;
  color: var(--ink-2);
}
article h4 {
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-size: 15px;
  font-weight: 600;
  margin: 24px 0 8px;
  color: var(--ink-2);
}
article p { margin: 0 0 16px; }
article ul, article ol { margin: 0 0 16px; padding-left: 26px; }
article li { margin-bottom: 6px; }
article a { color: var(--ink); text-decoration: underline; text-decoration-color: var(--rule); text-underline-offset: 3px; }
article a:hover { text-decoration-color: var(--accent); }
article strong { font-weight: 600; }
article em { font-style: italic; color: var(--ink-2); }
article hr { border: 0; border-top: 1px solid var(--rule); margin: 40px 0; }

article code {
  font-family: "JetBrains Mono", ui-monospace, "SF Mono", Consolas, monospace;
  font-size: 0.9em;
  background: var(--code-bg);
  color: var(--code-ink);
  padding: 1px 5px;
  border-radius: 3px;
}
article pre {
  background: var(--code-bg);
  color: var(--code-ink);
  padding: 16px 18px;
  border-radius: 4px;
  overflow-x: auto;
  font-size: 13.5px;
  line-height: 1.55;
  margin: 0 0 20px;
  border-left: 2px solid var(--accent);
}
article pre code {
  background: none;
  padding: 0;
  font-size: inherit;
}

article table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 22px;
  font-size: 15px;
  font-family: "Space Grotesk", system-ui, sans-serif;
}
article th, article td {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--rule);
  vertical-align: top;
}
article th { font-weight: 600; background: var(--code-bg); }
article td code { font-size: 0.92em; }

article blockquote {
  border-left: 2px solid var(--accent);
  margin: 0 0 18px;
  padding: 4px 0 4px 16px;
  color: var(--ink-2);
  font-style: italic;
}

footer.colophon {
  margin-top: 96px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  font-family: "Space Grotesk", system-ui, sans-serif;
  font-size: 12px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
  text-transform: uppercase;
}
footer.colophon a { color: var(--ink-3); text-decoration: none; border-bottom: 1px dotted var(--ink-3); }
footer.colophon a:hover { color: var(--ink); }

.loading {
  font-family: "JetBrains Mono", monospace;
  color: var(--ink-3);
  font-size: 13px;
}

@media (max-width: 600px) {
  body { font-size: 16px; }
  .wrap { padding: 40px 18px 80px; }
  article h1 { font-size: 26px; }
  article h2 { font-size: 19px; }
}

@media print {
  body { background: white; font-size: 11pt; line-height: 1.45; }
  .wrap { max-width: none; padding: 0; }
  header.masthead, footer.colophon { display: none; }
  article h1, article h2, article h3 { page-break-after: avoid; }
  article pre, article table { page-break-inside: avoid; }
  article a { color: var(--ink); text-decoration: none; }
}
</style>
</head>
<body>
<div class="wrap">

<header class="masthead">
  <span class="brand"><span class="chev">›</span> falsify · spec</span>
  <span>
    <a href="https://falsify.dev">falsify.dev</a> ·
    <a href="https://github.com/sk8ordie84/falsify/blob/main/spec/PRML-v0.1.md">github</a> ·
    <a href="https://github.com/sk8ordie84/falsify/discussions">discuss</a>
  </span>
</header>

<article id="content">
<p class="loading">Loading specification…</p>
</article>

<footer class="colophon">
  <p>PRML is a working draft published for public review under <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>. Editor: Studio-11 · <a href="mailto:hello@studio-11.co">hello@studio-11.co</a></p>
  <p>Reference implementation <a href="https://github.com/sk8ordie84/falsify">falsify</a> is MIT licensed.</p>
</footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
<script>
(async function () {
  const target = document.getElementById('content');
  const sources = [
    'PRML-v0.1.md',
    'https://raw.githubusercontent.com/sk8ordie84/falsify/main/spec/PRML-v0.1.md'
  ];

  let md = null;
  for (const src of sources) {
    try {
      const r = await fetch(src, { cache: 'no-store' });
      if (r.ok) { md = await r.text(); break; }
    } catch (e) { /* try next */ }
  }

  if (!md) {
    target.innerHTML = '<p class="loading">Could not load spec. <a href="https://github.com/sk8ordie84/falsify/blob/main/spec/PRML-v0.1.md">View on GitHub</a>.</p>';
    return;
  }

  marked.setOptions({ gfm: true, breaks: false, headerIds: true, mangle: false });
  target.innerHTML = marked.parse(md);

  // Strip the duplicated H1 since the markdown leads with one
  // (kept for GitHub readability; the page already has masthead)
  // — leave it; readers expect the title here too.

  // Rewrite raw README path links to GitHub if any leak in
  document.querySelectorAll('article a[href^="/Users/"]').forEach(a => a.removeAttribute('href'));
})();
</script>
</body>
</html>
